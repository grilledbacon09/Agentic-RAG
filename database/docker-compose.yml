version: '3.14'

services:
  # object storage
    minio:
        image: minio/minio
        container_name: mediccal_minio
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: minio111
        command: server /data --console-address ":9001"
        volumes:
        - ./data/minio:/data
    
    # RDBMS & standard master data
    postgres:
        image: ankane/pgvector:latest
        container_name: medical_postgresql
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: med_db
            POSTGRES_PASSWORD: postgres111
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
    
    # vector db: sementic search
    chromadb:
      image: chromadb/chroma:latest
      volumes:
      - ./data/chroma:/chroma/chroma
      ports:
      - "8000:8000"
      environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
